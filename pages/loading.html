<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Care Plus — Loading</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../styles/style.css"/>
</head>
<body class="loading-page">

  <!-- Ambient depth blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Splash content -->
  <div class="splash-card">

    <!-- App icon -->
    <div class="app-icon-wrap">
      <div class="app-icon">
        <svg class="heart" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M26 44S4 30.5 4 15.5C4 9.1 9.1 4 15.5 4c3.8 0 7.2 1.9 9.4 4.8L26 10.2l1.1-1.4C29.3 5.9 32.7 4 36.5 4 42.9 4 48 9.1 48 15.5 48 30.5 26 44 26 44Z"
                fill="#2aaa7a"/>
        </svg>
      </div>

      <!-- Sparkle -->
      <div class="sparkle">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2 L14.5 10 L22 11.5 L14.5 13 L13 21 L11.5 13 L4 11.5 L11.5 10 Z"
                fill="#9fd630" stroke="#9fd630" stroke-linejoin="round"/>
          <circle cx="20" cy="5" r="2" fill="#9fd630" opacity=".7"/>
        </svg>
      </div>
    </div>

    <!-- Name & tagline -->
    <h1 class="app-name">Care Plus</h1>
    <p class="app-tagline">
      Transformando hábitos em conquistas. Aguarde, estamos preparando tudo para você!
    </p>

    <!-- Animated dots -->
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
