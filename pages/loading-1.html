<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Care Plus — Bem-vindo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/onboarding.css"/>
</head>
<body>

<div class="screen">

  <!-- Hero -->
  <div class="hero hero-slide-1">
    <div class="icon-circle">
      <svg viewBox="0 0 60 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 50C30 50 5 35.5 5 18.5C5 11.1 11.1 5 18.5 5C22.6 5 26.3 6.9 28.8 9.9L30 11.4L31.2 9.9C33.7 6.9 37.4 5 41.5 5C48.9 5 55 11.1 55 18.5C55 35.5 30 50 30 50Z"
              stroke="#2aaa80" stroke-width="4" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>Bem-vindo ao Challenge Care Plus</h1>
    <p>
      Transforme sua saúde em uma jornada recompensadora. Complete missões diárias e semanais
      para ganhar pontos e conquistar benefícios exclusivos.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer-bar">
    <div class="nav-row">
      <div class="dots">
        <div class="dot active" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
      </div>
      <span class="step-label" id="step-label">1 de 4</span>
    </div>

    <button class="btn-continuar" id="btn-continuar" onclick="nextStep()">
      <span class="chevron">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M3 1.5L7 5L3 8.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      Continuar
    </button>
  </div>

</div>

<script src="../scripts/loading-1.js"></script>
</body>
</html>
