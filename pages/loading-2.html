<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Care Plus — Gamificação Ética</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/onboarding.css"/>
</head>
<body>

<div class="screen">

  <!-- Hero -->
  <div class="hero hero-slide-2">
    <div class="icon-circle">
      <svg viewBox="0 0 58 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cup body -->
        <path d="M14 6h30v20c0 8.284-6.716 15-15 15s-15-6.716-15-15V6z"
              stroke="#2aaa80" stroke-width="3.2" stroke-linejoin="round" fill="none"/>
        <!-- Left handle -->
        <path d="M14 10H8a4 4 0 0 0 0 8h6"
              stroke="#2aaa80" stroke-width="3.2" stroke-linecap="round" fill="none"/>
        <!-- Right handle -->
        <path d="M44 10h6a4 4 0 0 1 0 8h-6"
              stroke="#2aaa80" stroke-width="3.2" stroke-linecap="round" fill="none"/>
        <!-- Stem -->
        <line x1="29" y1="41" x2="29" y2="49"
              stroke="#2aaa80" stroke-width="3.2" stroke-linecap="round"/>
        <!-- Base -->
        <path d="M19 49h20" stroke="#2aaa80" stroke-width="3.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>Gamificação Ética</h1>
    <p>
      Progresso sem pressão. Aqui você evolui no seu ritmo, sem rankings obrigatórios
      ou punições. Cada conquista é uma vitória pessoal.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer-bar">
    <div class="nav-row">
      <div class="dots">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
      </div>
      <span class="step-label" id="step-label">2 de 4</span>
    </div>

    <div class="btn-row">
      <button class="btn-voltar" onclick="prevStep()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M7 1.5L3 5L7 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar
      </button>

      <button class="btn-continuar" id="btn-continuar" onclick="nextStep()">
        <span class="chevron">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M3 1.5L7 5L3 8.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Continuar
      </button>
    </div>
  </div>

</div>

<script src="../scripts/loading-2.js"></script>
</body>
</html>
